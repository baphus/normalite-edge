services:
  - type: web
    name: normalite-edge-api
    env: node
    plan: standard
    region: ohio
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_ENV
        scope: all
        value: production
      - key: DATABASE_URL
        scope: all
        sync: false
      - key: DIRECT_URL
        scope: all
        sync: false
